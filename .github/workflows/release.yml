name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            goarch: amd64
            suffix: ""
          - os: linux
            arch: arm64
            goarch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            goarch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            goarch: arm64
            suffix: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build aurora
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o "aurora-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }}" \
            ./cmd/aurora/

      - uses: actions/upload-artifact@v4
        with:
          name: aurora-${{ matrix.os }}-${{ matrix.arch }}
          path: aurora-*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum aurora-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aurora-*
            checksums.txt
